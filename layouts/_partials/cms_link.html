{{- $to := partial "cms_url" . -}}
{{- if and (ne $to "") (ne $to nil) -}}
  {{- $textContent := .target_link_text -}}
  {{- if .target_text -}}
    {{- $textContent = .target_text -}}
  {{- end -}}
  {{- $content := $textContent -}}
  <a href="{{- $to -}}" class="{{- .class -}}" >
    {{- $content -}}
  </a>
{{- end -}}
