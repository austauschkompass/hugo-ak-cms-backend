<nav class="navbar navbar-custom navbar-expand-lg navbar-light">
  <div class="container">
    <a class="navbar-brand" href="/">
      {{ with resources.Get "images/navbar_logo.svg" }}
        <img src="{{ .RelPermalink }}" alt="{{ site.Title }} Logo" class="brand-logo" height="50"></img>
      {{ end }}
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Navigation ein-/ausblenden">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">{{ site.Title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          {{ templates.Inner . }}
        </ul>
      </div>
    </div>
  </div>
</nav>
