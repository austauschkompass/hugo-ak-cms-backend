<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ block "body_class" . }}{{ end }}">
  {{ block "header" . }}{{ partial "header" . }}{{ end }}
  <main>
    {{ block "main" . }}{{ .Content }}{{ end }}
  </main>
  {{ block "footer" . }}{{ partial "footer" . }}{{ end }}
</body>
</html>
